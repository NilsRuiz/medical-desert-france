{{- if .Values.mlflow.enabled -}}
{{- if .Values.mlflow.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mdf.fullname" . }}-mlflow-artifacts
  labels:
    {{- include "mdf.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  accessModes:
    {{- toYaml .Values.mlflow.persistence.accessModes | nindent 4 }}
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.mlflow.persistence.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mdf.fullname" . }}-mlflow
  labels:
    {{- include "mdf.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  replicas: {{ .Values.mlflow.replicaCount }}
  selector:
    matchLabels:
      {{- include "mdf.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mlflow
  template:
    metadata:
      labels:
        {{- include "mdf.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mlflow
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mlflow
          image: "{{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag }}"
          imagePullPolicy: {{ .Values.mlflow.image.pullPolicy }}
          args:
            - mlflow
            - server
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --backend-store-uri
            - $(DATABASE_URL)
            - --default-artifact-root
            - {{ .Values.mlflow.artifactRoot }}
          env:
            {{- include "mdf.env" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: artifacts
              mountPath: {{ .Values.mlflow.artifactRoot }}
          resources:
            {{- toYaml .Values.mlflow.resources | nindent 12 }}
      volumes:
        - name: artifacts
          {{- if .Values.mlflow.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "mdf.fullname" . }}-mlflow-artifacts
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.mlflow.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mlflow.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mlflow.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mdf.fullname" . }}-mlflow
  labels:
    {{- include "mdf.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  type: {{ .Values.mlflow.service.type }}
  ports:
    - name: http
      port: {{ .Values.mlflow.service.port }}
      targetPort: http
  selector:
    {{- include "mdf.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
{{- end }}

