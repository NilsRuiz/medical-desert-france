{{- if .Values.api.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mdf.fullname" . }}-api
  labels:
    {{- include "mdf.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "mdf.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "mdf.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        {{- toYaml .Values.api.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mdf.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            {{- toYaml .Values.api.command | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
          envFrom:
            - configMapRef:
                name: {{ include "mdf.fullname" . }}-config
          env:
            {{- include "mdf.env" . | nindent 12 }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.api.probes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.api.probes.failureThreshold }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

