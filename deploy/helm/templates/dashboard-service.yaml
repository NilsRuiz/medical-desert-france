{{- if .Values.dashboard.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mdf.fullname" . }}-dashboard
  labels:
    {{- include "mdf.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: http
  selector:
    {{- include "mdf.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
{{- end }}

