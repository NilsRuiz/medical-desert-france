services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mdf
      POSTGRES_PASSWORD: mdf
      POSTGRES_DB: mdf
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdf"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns --default-artifact-root /mlruns
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlruns

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://mdf:mdf@postgres:5432/mdf
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://mdf:mdf@postgres:5432/mdf
    command: ["mdf", "seed-db", "--data", "data/sample_communes.csv"]
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres-data:
  mlflow-data:
